<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Product</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Inventory</h2>

        <a href="./index.html">📊 Dashboard</a>
        <a href="./product.html">📦 Products</a>
        <a href="./add-product.html">➕ Add Product</a>
        <a href="./sales.html">💰 Sales Today</a>
        <a href="./sales-history.html">📈 Sales History</a>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <section class="edit-product-page">

            <h1>Edit Product</h1>

            <div class="form-card">

                <form id="editForm">

                    <input
                        type="text"
                        id="productName"
                        placeholder="Product Name"
                        required
                    >

                    <input
                        type="text"
                        id="category"
                        placeholder="Category"
                        required
                    >

                    <input
                        type="text"
                        id="brand"
                        placeholder="Brand"
                        required
                    >
                    <label>Group</label>

                    <select id="group" required>
                        <option value="">Select Group</option>
                        <option value="Electronic">Electronic</option>
                        <option value="Accessory">Accessory</option>
                    </select>

                    <input
                        type="number"
                        id="quantity"
                        placeholder="Quantity"
                        required
                    >

                    <input
                        type="number"
                        id="buyingPrice"
                        placeholder="Buying Price"
                        required
                    >

                    <input
                        type="number"
                        id="sellingPrice"
                        placeholder="Selling Price"
                        required
                    >

                    <button type="submit">
                        Update Product
                    </button>

                </form>
                <div class="form-actions">
                  <a href="./product.html" class="cancel-btn">
                        Cancel
                   </a>
                </div>

            </div>

        </section>

    </div>

<script type="module" src="./js/edit-product.js"></script>

</body>
</html>
