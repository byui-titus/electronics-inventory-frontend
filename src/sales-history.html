<!DOCTYPE html>
<html>
<head>
  <title>Sales History</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="sidebar">

    <h2>Inventory</h2>

    <a href="./index.html">📊 Dashboard</a>
    <a href="./product.html">📦 Products</a>
    <a href="./add-product.html">➕ Add Product</a>
    <a href="./sales.html">💰 Sales Today</a>
    <a href="./sales-history.html" class="active">📈 Sales History</a>

</div>

<div class="main-content">

    <section class="sales-history-page">

        <h1>Sales History</h1>

        <div class="dashboard">

            <div class="card">
                <h2>Total Revenue</h2>
                <p id="totalRevenue">Loading...</p>
            </div>

            <div class="card">
                <h2>Total Profit</h2>
                <p id="totalProfit">Loading...</p>
            </div>

        </div>

        <div class="filters">

            <button onclick="setFilter('today')">
                Today
            </button>

            <button onclick="setFilter('week')">
                This Week
            </button>

            <button onclick="setFilter('month')">
                This Month
            </button>

            <button onclick="setFilter('all')">
                All Time
            </button>

        </div>

        <div class="table-card">

            <table>

                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Qty</th>
                        <th>Revenue</th>
                        <th>Profit</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody id="historyTable"></tbody>

            </table>

        </div>

    </section>

</div>

<script type="module" src="./js/sales-history.js"></script>

</body>
</html>
