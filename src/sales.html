<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Today's Sales</title>
    <link rel="icon" href="./public/favicon.jpg" type="image/png">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

<div class="sidebar">

    <h2>Inventory</h2>

    <a href="./index.html">📊 Dashboard</a>
    <a href="./product.html">📦 Products</a>
    <a href="./add-product.html">➕ Add Product</a>
    <a href="./sales.html" class="active">💰 Sales Today</a>
    <a href="./sales-history.html">📈 Sales History</a>

</div>

<div class="main-content">

    <section class="sales-page">

        <h1>Today's Sales</h1>

        <div class="dashboard">

            <div class="card">
                <h3>Total Sales Today</h3>
                <p id="totalSales">0</p>
            </div>

            <div class="card">
                <h3>Total Revenue</h3>
                <p id="totalRevenue">0</p>
            </div>

            <div class="card">
                <h3>Total Profit</h3>
                <p id="totalProfit">0</p>
            </div>

        </div>

        <div class="table-card">

            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity Sold</th>
                        <th>Revenue</th>
                        <th>Profit</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody id="salesTable"></tbody>

            </table>

        </div>

    </section>

</div>

<script type="module" src="./js/sales.js"></script>

</body>
</html>
