<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Product</title>

  <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">

        <h2>Topaz Inventory</h2>

        <a href="./index.html">Dashboard</a>
        <a href="./product.html" >Products</a>
        <a href="./add-product.html" class="active">Add Product</a>
        <a href="./sales.html" >Sales</a>
        <a href="./sales-history.html">History</a>

    </div>

    <!-- Main Content -->
    <div class="main-content">

        <section class="add-product-page">

            <h1>Add Product</h1>

            <div class="form-card">

                <form id="productForm">

                    <input
                        type="text"
                        id="productName"
                        placeholder="Product Name"
                        required
                    >

                    <input
                        type="text"
                        id="category"
                        placeholder="Category"
                        required
                    >

                    <input
                        type="text"
                        id="brand"
                        placeholder="Brand"
                        required
                    >

                    <input
                        type="number"
                        id="quantity"
                        placeholder="Quantity"
                        required
                    >

                    <input
                        type="number"
                        id="buyingPrice"
                        placeholder="Buying Price"
                        required
                    >

                    <input
                        type="number"
                        id="sellingPrice"
                        placeholder="Selling Price"
                        required
                    >

                    <button type="submit">
                        Add Product
                    </button>

                </form>

            </div>

        </section>

    </div>

<script type="module" src="./js/add-product.js"></script>

</body>
</html>
