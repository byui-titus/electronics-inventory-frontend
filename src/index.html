<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics Inventory Dashboard</title>

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header>
        <h1>Electronics Inventory Dashboard</h1>

        <nav>
            <a href="./index.html">Dashboard</a>
            <a href="./product.html">Products</a>
            <a href="./add-product.html">Add product</a>
        </nav>
    </header>
  

    <main>

        <section class="dashboard">

            <div class="card">
                <h2>Total Products</h2>
                <p id="totalProducts">Loading...</p>
            </div>

            <div class="card">
                <h2>Low Stock</h2>
                <p id="lowStockProducts">Loading...</p>
            </div>

            <div class="card">
                <h2>Total Revenue</h2>
                <p id="totalRevenue">Loading...</p>
            </div>

            <div class="card">
                <h2>Total Profit</h2>
                <p id="totalProfit">Loading...</p>
            </div>

        </section>

    </main>

    <script type="module" src="./js/dashboard.js"></script>

</body>
</html>
